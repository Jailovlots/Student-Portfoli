kind = "mobile"
previewPath = "/"
title = "Student Enrollment Portfolio"
version = "1.0.0"
id = "artifacts/student-enrollment"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21492

[services.development]
run = "pnpm --filter @workspace/student-enrollment run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/student-enrollment", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/student-enrollment", "run", "serve" ]

[services.env]
PORT = "21492"
BASE_PATH = "/"
